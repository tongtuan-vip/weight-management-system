<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Weight Management System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/theme.css" rel="stylesheet">

    {% block head_extra %}{% endblock %}
</head>
<body>
   {% if user %}
    <div class="app-shell">
        {% include 'sidebar.html' %}

        <div id="pageContent" class="page-content">
            <div class="container py-3 page-wrap">
                {% block content %}{% endblock %}
                {% include 'footer.html' %}
            </div>
        </div>
    </div>
{% else %}
    {% block public_content %}{% endblock %}
{% endif %}

    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 3000;">
        {% if message %}
        <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const htmlTag = document.documentElement;
            const sidebar = document.getElementById("sidebar");
            const pageContent = document.getElementById("pageContent");
            const toggleSidebar = document.getElementById("toggleSidebar");
            const themeToggle = document.getElementById("themeToggle");

            const savedTheme = localStorage.getItem("appTheme") || "light";
            htmlTag.setAttribute("data-theme", savedTheme);

            const savedSidebar = localStorage.getItem("sidebarCollapsed");
            if (savedSidebar === "1" && sidebar && pageContent) {
                sidebar.classList.add("collapsed");
                pageContent.classList.add("expanded");
            }

            if (themeToggle) {
                updateThemeButton(savedTheme);

                themeToggle.addEventListener("click", function () {
                    const currentTheme = htmlTag.getAttribute("data-theme") || "light";
                    const nextTheme = currentTheme === "dark" ? "light" : "dark";
                    htmlTag.setAttribute("data-theme", nextTheme);
                    localStorage.setItem("appTheme", nextTheme);
                    updateThemeButton(nextTheme);
                });
            }

            if (toggleSidebar && sidebar && pageContent) {
                toggleSidebar.addEventListener("click", function () {
                    sidebar.classList.toggle("collapsed");
                    pageContent.classList.toggle("expanded");
                    localStorage.setItem(
                        "sidebarCollapsed",
                        sidebar.classList.contains("collapsed") ? "1" : "0"
                    );
                });
            }

            const toastEl = document.getElementById("liveToast");
            if (toastEl) {
                const toast = new bootstrap.Toast(toastEl, {
                    delay: 2500
                });
                toast.show();
            }

            function updateThemeButton(theme) {
                if (!themeToggle) return;
                themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
                themeToggle.title = theme === "dark" ? "Chuyển sang giao diện sáng" : "Chuyển sang giao diện tối";
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
