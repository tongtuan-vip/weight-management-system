<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            background:#f4f6fb;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:Arial, sans-serif;
            padding:24px;
        }

        .auth-card{
            width:100%;
            max-width:500px;
            background:#ffffff;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 14px 40px rgba(0,0,0,0.10);
        }

        .auth-header{
            background:linear-gradient(135deg,#198754,#20c997);
            color:white;
            padding:28px 30px;
        }

        .auth-header h1{
            font-size:30px;
            margin-bottom:8px;
            font-weight:700;
        }

        .auth-header p{
            margin-bottom:0;
            opacity:0.95;
        }

        .auth-body{
            padding:30px;
        }

        .form-control{
            border-radius:14px;
            padding:12px 14px;
        }

        .btn-auth{
            border-radius:14px;
            padding:12px;
            font-weight:700;
        }

        .bottom-link{
            color:#6c757d;
            font-size:14px;
            text-align:center;
            margin-top:16px;
        }

        .bottom-link a{
            color:#198754;
            font-weight:700;
            text-decoration:none;
        }

        .password-wrap{
            position:relative;
        }

        .toggle-password{
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:18px;
            opacity:0.65;
        }

        .toggle-password:hover{
            opacity:1;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h1>Quên mật khẩu</h1>
            <p>Nhập email và mật khẩu mới để đặt lại tài khoản của bạn.</p>
        </div>

        <div class="auth-body">
            {% if message %}
            <div class="alert alert-warning">{{ message }}</div>
            {% endif %}

            <form action="/forgot-password" method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="Nhập email đã đăng ký" required>
                </div>

                <div class="mb-3 password-wrap">
                    <label class="form-label">Mật khẩu mới</label>
                    <input type="password" name="new_password" id="new_password" class="form-control" placeholder="Nhập mật khẩu mới" required>
                    <span class="toggle-password" onclick="togglePassword('new_password')">👁</span>
                </div>

                <div class="mb-4 password-wrap">
                    <label class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Nhập lại mật khẩu mới" required>
                    <span class="toggle-password" onclick="togglePassword('confirm_password')">👁</span>
                </div>

                <button type="submit" class="btn btn-success btn-auth w-100">Đặt lại mật khẩu</button>
            </form>

            <div class="bottom-link">
                <a href="/login">← Quay lại đăng nhập</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId){
            const input = document.getElementById(inputId);
            if(input.type === "password"){
                input.type = "text";
            }else{
                input.type = "password";
            }
        }
    </script>
</body>
</html>
